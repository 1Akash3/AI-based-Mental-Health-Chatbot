<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mental Health Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <div id="chat-container">
      <div id="messages"></div>
      <input id="input" placeholder="Type your message..." />
      <div id="input-area">
          <button id="send">Send</button>
          <button id="mic">🎤 Speak</button>
      </div>
  </div>
  <canvas id="avatar"></canvas>
  <div id="microphone-denied-message" style="display: none;">
      <p>Microphone access was denied. To use voice input, please enable it in your browser settings.</p>
      <button id="open-settings-button">Open Browser Settings</button>
      <p>You can usually find this in Privacy/Security settings, then Site Permissions or similar.</p>
  </div>
  <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
